name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

      - name: Build viewer and CLI bundle
        run: npm run build

